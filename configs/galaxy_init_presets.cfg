# =============================================================================
# cpp_sim galaxy initial conditions — copy lines into configs/my.local.cfg or
# merge with your run config. See cpp_sim/galaxy_init.hpp for parameter docs.
# =============================================================================
#
# Preset mood (noise only — galaxy_init_master_chaos scales these three, not modes/clumps):
#   calm:   position_noise ~0.002, angle_noise ~0.02 rad, magnitude_noise ~0.02
#   warm:   position_noise ~0.01,  angle_noise ~0.08 rad, magnitude_noise ~0.05
#   chaotic: position_noise ~0.03, angle_noise ~0.2 rad,  magnitude_noise ~0.12
#   clumpy: use clumpy_disk + calm/warm noise + clumpiness 0.2–0.5
#
# -----------------------------------------------------------------------------
# Example A — symmetric_disk (default legacy-compatible: velocity_noise only)
# -----------------------------------------------------------------------------
# galaxy_init_template = symmetric_disk
# galaxy_init_seed = 12345
# galaxy_init_master_chaos = 1.0
# velocity_noise = 0.05
# galaxy_init_position_noise = 0
# galaxy_init_velocity_angle_noise = 0
# galaxy_init_velocity_magnitude_noise = 0
#
# -----------------------------------------------------------------------------
# Example B — clumpy_disk (clusters on a smooth disk; tune clumpiness)
# -----------------------------------------------------------------------------
# galaxy_init_template = clumpy_disk
# galaxy_init_seed = 42
# galaxy_init_clumpiness = 0.35
# galaxy_init_num_clumps = 12
# galaxy_init_clump_radius_fraction = 0.06
# galaxy_init_position_noise = 0.005
# galaxy_init_velocity_angle_noise = 0.04
# galaxy_init_velocity_magnitude_noise = 0.03
# galaxy_init_master_chaos = 1.0
# velocity_noise = 0
#
# -----------------------------------------------------------------------------
# Example C — weak_m2 (weak cos(2θ) density bias; keep |amplitude| modest, e.g. < 0.15)
# -----------------------------------------------------------------------------
# galaxy_init_template = weak_m2
# galaxy_init_seed = 7
# galaxy_init_m2_amplitude = 0.08
# galaxy_init_position_noise = 0.002
# galaxy_init_velocity_angle_noise = 0.03
# galaxy_init_velocity_magnitude_noise = 0.02
# velocity_noise = 0
#
# -----------------------------------------------------------------------------
# Example D — preformed_spiral (two-arm phase seed; winding is dimensionless on log r)
# -----------------------------------------------------------------------------
# galaxy_init_template = preformed_spiral
# galaxy_init_seed = 99
# galaxy_init_spiral_amplitude = 0.06
# galaxy_init_spiral_winding = 1.2
# galaxy_init_spiral_phase = 0.0
# galaxy_init_position_noise = 0.003
# galaxy_init_velocity_angle_noise = 0.04
# galaxy_init_velocity_magnitude_noise = 0.03
# velocity_noise = 0
#
# -----------------------------------------------------------------------------
# symmetric_disk_noisy — same recipe as symmetric_disk; use template name to tag runs
# weak_m3 — set galaxy_init_m3_amplitude (e.g. 0.08)
# weak_bar — set galaxy_init_bar_amplitude and optional galaxy_init_bar_axis_ratio (e.g. 1.4)
# =============================================================================
