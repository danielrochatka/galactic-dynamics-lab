# Manuscript v11 Sec. XI C–D — Earth–Moon line-of-centers weak-field correspondence BENCHMARK ONLY.
# NOT full TPF many-body dynamics. NOT direct_tpf. NOT orbit integration. NOT VDSG. Delta C omitted.
#
# Implements paper Eqs. (42)–(47) mapping as stated: φ from (44), aTPF from (45), Newtonian line from (46).
# CLI (from cpp_sim/): use mode + overrides, or merge this file into your run config layer.
# Example:
#   ./galaxy_sim tpf_v11_weak_field_correspondence --output_dir=outputs/v11_em_line --physics_package=TPFCore \
#     --tpf_analysis_mode=v11_weak_field_correspondence --v11_weak_field_correspondence_benchmark=earth_moon_line_of_centers \
#     --tpf_vdsg_coupling=0 --tpfcore_probe_radius_min=6.371e6 --tpfcore_probe_radius_max=3.5e8 --tpfcore_probe_samples=200

simulation_mode = tpf_v11_weak_field_correspondence
physics_package = TPFCore
tpf_analysis_mode = v11_weak_field_correspondence
v11_weak_field_correspondence_benchmark = earth_moon_line_of_centers

tpf_vdsg_coupling = 0
tpf_dynamics_mode = legacy_readout

# Paper Table II (defaults in code; override here if needed)
# v11_em_mass_earth_kg = 5.972e24
# v11_em_mass_moon_kg = 7.348e22
# v11_em_mean_distance_m = 3.844e8
# v11_em_sidereal_period_s = 0
#   (0 => Kepler T = 2π√(D³/(G(ME+MM))) with TPF_G_SI)
# v11_em_calib_surface_radius_m = 6.371e6
# v11_em_calib_surface_g_m_s2 = 9.81

# Sample x along Earth→Moon line: Earth center x=0, Moon x=D. Require 0 < x_min < x_max < D.
tpfcore_probe_radius_min = 6.371e6
tpfcore_probe_radius_max = 3.5e8
tpfcore_probe_samples = 200

# bh_mass unused in earth_moon_line_of_centers (axis_monopole benchmark uses bh_mass)
bh_mass = 0

save_run_info = true
