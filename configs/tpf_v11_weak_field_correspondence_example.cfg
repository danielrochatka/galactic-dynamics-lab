# Manuscript v11 static weak-field correspondence audit (NOT dynamics, NOT legacy readout accelerations).
# Requires: physics_package=TPFCore, tpf_v11_weak_field_correspondence + tpf_analysis_mode below,
# tpf_vdsg_coupling=0, bh_mass>0, positive probe radii on +z axis.
#
# CLI: galaxy_sim tpf_v11_weak_field_correspondence --output_dir=outputs/v11_wfc ...

simulation_mode = tpf_v11_weak_field_correspondence
physics_package = TPFCore
tpf_analysis_mode = v11_weak_field_correspondence
tpf_vdsg_coupling = 0
tpf_dynamics_mode = legacy_readout

# Point source mass M (kg) for correspondence Phi = -G M / sqrt(z^2 + softening^2)
bh_mass = 1.98847e30
softening = 1.0

# Sample +z axis: r in [min, max] (meters), count
tpfcore_probe_radius_min = 1.0e9
tpfcore_probe_radius_max = 1.0e11
tpfcore_probe_samples = 50

save_run_info = true
