# Minimal deterministic baseline for automated smoke/integration tests.
# Select with: export GALAXY_RUN_CONFIG=/path/to/repo/configs/smoke_test.cfg
# (see docs/TESTING.md). CLI flags still override these values.

simulation_mode = galaxy
physics_package = Newtonian

n_stars = 64
# SI: one solar mass per star; ~10^6 M_sun SMBH; ~10 kpc disk (short n_steps for CI)
star_mass = 1.98847e30
bh_mass = 1.98847e36
galaxy_radius = 3.0e20

dt = 0.01
n_steps = 100
snapshot_every = 10

softening = 1.0e16
enable_star_star_gravity = true
save_snapshots = true
save_run_info = true

galaxy_init_template = symmetric_disk
galaxy_init_seed = 12345
galaxy_init_master_chaos = 1.0

tpfcore_enable_provisional_readout = false
tpf_vdsg_coupling = 0
