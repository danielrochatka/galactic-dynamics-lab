# TPFCore legacy_readout experimental path for bh_orbit_validation with VDSG coupling set to zero.
# Compare against configs/bh_orbit_validation_newtonian_baseline.cfg at the same IC keys (same seed of physics, different package).
# Run (from cpp_sim): GALAXY_RUN_CONFIG=/path/to/repo/configs/bh_orbit_validation_tpfcore_legacy_readout_vdsg_off.cfg ./galaxy_sim [--plot]
# Honest labels: TPFCore legacy_readout experimental; not direct_tpf; not paper correspondence mode; VDSG off (tpf_vdsg_coupling = 0).

simulation_mode = bh_orbit_validation
physics_package = TPFCore

tpf_dynamics_mode = legacy_readout
tpfcore_enable_provisional_readout = true
tpfcore_readout_mode = tensor_radial_projection
tpf_vdsg_coupling = 0

n_stars = 1
star_mass = 1.98847e30
bh_mass = 1.98847e36
validation_two_body_radius = 5.0e18
validation_two_body_speed_ratio = 1.0

dt = 0.01
validation_n_steps = 5000
validation_snapshot_every = 5

softening = 1.0e16
enable_star_star_gravity = false
initial_velocity_scale = 1.0

save_snapshots = true
save_run_info = true
