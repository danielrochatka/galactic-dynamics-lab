# Example configuration for the galaxy N-body simulator
# Copy to configs/local/ or configs/my.local.cfg and edit for local overrides.
# Python main.py uses defaults from config.py; this file documents available options.

simulation_mode = galaxy
n_stars = 1000
# SI: one solar mass per star; ~10^6 M_sun SMBH; ~10 kpc disk (matches cpp_sim/config.hpp defaults)
star_mass = 1.98847e30
bh_mass = 1.98847e36

inner_radius = 3.0e19
outer_radius = 3.0e20
galaxy_radius = 3.0e20

dt = 0.01
n_steps = 120000
snapshot_every = 10

softening = 1.0e16
enable_star_star_gravity = true
physics_package = Newtonian

velocity_noise = 0.05
initial_velocity_scale = 1.0

# --- cpp_sim galaxy mode: initial conditions (see configs/galaxy_init_presets.cfg) ---
# galaxy_init_template = symmetric_disk
# galaxy_init_seed = 12345
# galaxy_init_master_chaos = 1.0
# galaxy_init_position_noise = 0.0
# galaxy_init_velocity_angle_noise = 0.0
# galaxy_init_velocity_magnitude_noise = 0.0
# galaxy_init_clumpiness = 0.0
# galaxy_init_num_clumps = 8
# galaxy_init_clump_radius_fraction = 0.08
# galaxy_init_m2_amplitude = 0.0
# galaxy_init_m3_amplitude = 0.0
# galaxy_init_bar_amplitude = 0.0
# galaxy_init_bar_axis_ratio = 1.0
# galaxy_init_spiral_amplitude = 0.0
# galaxy_init_spiral_winding = 1.0
# galaxy_init_spiral_phase = 0.0
# If all three *noise* lines are 0, legacy velocity_noise (above) still applies to vx,vy.

save_snapshots = true
save_run_info = true

# cpp_sim: render_manifest.json/.txt written after galaxy runs; plot_cpp_run reads for overlays.
# render_overlay_mode = none | minimal | audit_full (default in code: none = unchanged PNG pixels; use minimal for audit)
# render_overlay_mode = minimal

# Display units (postprocess / plot_cpp_run only; snapshots and run_info physics numbers stay SI)
# display_distance_unit = auto | m | km | AU | ly | pc | kpc
# display_time_unit = auto | s | min | hr | day | yr | kyr | Myr
# display_velocity_unit = auto | m/s | km/s
# display_units_in_overlay = true
# display_show_unit_reference = true

# Validation modes (earth_moon_benchmark, bh_orbit_validation, symmetric_pair, small_n_conservation, timestep_convergence; two_body_orbit deprecated alias → earth_moon_benchmark in C++)
# Examples (cpp_sim): simulation_mode = earth_moon_benchmark
#                     simulation_mode = bh_orbit_validation
#                     simulation_mode = two_body_orbit   # deprecated; same as earth_moon_benchmark (stderr warning)
validation_two_body_radius = 5.0e18
validation_two_body_speed_ratio = 1.0
validation_symmetric_include_bh = true
validation_symmetric_separation = 7.48e10
validation_symmetric_speed = 3.0e4
validation_small_n = 5
validation_n_steps = 5000
validation_snapshot_every = 5

# Python rendering only
render_radius = 150.0
render_animation = false
render_diagnostics = true
render_initial_final = true
diagnostic_cutoff_radius = 3.0e20
