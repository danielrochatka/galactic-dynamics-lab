# Canonical Newtonian baseline for bh_orbit_validation: one star on circular-ish orbit, fixed BH at origin.
# Run (from cpp_sim): GALAXY_RUN_CONFIG=/path/to/repo/configs/bh_orbit_validation_newtonian_baseline.cfg ./galaxy_sim [--plot]
# Postprocess: from repo root, python3 plot_cpp_run.py cpp_sim/outputs/<run_id>
# Labels (PNG footnotes): Newtonian baseline; VDSG off in the honest-compare sense; not paper mode; not direct_tpf.
# Effective scenario IC + mode defaults are written to resolved_scenario.txt/json for each run.

simulation_mode = bh_orbit_validation
physics_package = Newtonian

n_stars = 1
star_mass = 1.98847e30
bh_mass = 1.98847e36
validation_two_body_radius = 1.0e13
validation_two_body_speed_ratio = 1.0

dt = 10000.0
validation_n_steps = 6000
validation_snapshot_every = 10

softening = 0.0
enable_star_star_gravity = false
initial_velocity_scale = 1.0

save_snapshots = true
save_run_info = true
