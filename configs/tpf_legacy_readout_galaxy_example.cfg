# Example: TPFCore galaxy run on the current default dynamics path (legacy provisional readout + optional VDSG).
# Merge with your run config or pass keys via galaxy_sim CLI.
#
# active_dynamics_branch in run_info will look like:
#   TPF_legacy_readout:<tpfcore_readout_mode>  or  TPF_legacy_readout_plus_VDSG:<mode>  when tpf_vdsg_coupling != 0

physics_package = TPFCore
tpf_dynamics_mode = legacy_readout
tpfcore_enable_provisional_readout = true
tpfcore_readout_mode = tensor_radial_projection
tpf_vdsg_coupling = 0
