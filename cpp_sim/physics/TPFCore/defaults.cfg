# TPFCore package defaults
# Honest primitive TPF: Theta, I. Inspection-first.
# Manuscript v11 vs experimental closures: TPF_PAPER_V11_SCOPE.md (this directory).
# Galaxy disk IC keys (galaxy mode): galaxy_init_* in run config; presets in repo configs/galaxy_init_presets.cfg
# readout_scale: 0.2046442 was INVALIDATED (calibration used wrong Newtonian benchmark by factor r). Pending recalibration; use 1.0 or run tpf_weak_field_calibration.
# tpf_dynamics_mode = legacy_readout   # default; use direct_tpf only for the future direct path (stub throws until implemented)

tpfcore_enable_provisional_readout = false
tpfcore_readout_mode = tensor_radial_projection
tpfcore_readout_scale = 1.0
tpfcore_theta_tt_scale = 1.0
tpfcore_theta_tr_scale = 1.0
tpf_kappa = 1.0e32
tpf_vdsg_coupling = 1.0e-20
# 0 => M_ref = star_mass at init; >0 => explicit reference mass (kg) for log mass-normalized lambda_eff
tpf_vdsg_mass_baseline_kg = 0
# Global |a| cap (fraction * |v|/dt) after readout + VDSG. Default OFF for a clean λ=0 control path.
tpf_global_accel_shunt_enable = false
tpf_global_accel_shunt_fraction = 0.001
# Per-snapshot pipeline CSV at end of run (baseline / VDSG / shunt metrics)
tpf_accel_pipeline_diagnostics_csv = true
tpf_poisson_bins = 100
tpf_poisson_max_radius = 0.0
tpf_cooling_fraction = 0.2
tpfcore_dump_readout_debug = true
tpfcore_live_orbit_force_audit = false
tpfcore_probe_radius_min = 1.0
tpfcore_probe_radius_max = 50.0
tpfcore_probe_samples = 100
tpfcore_dump_invariant_profile = true
tpfcore_dump_theta_profile = true
tpfcore_source_softening = 0.0
tpfcore_residual_step = 1e-6